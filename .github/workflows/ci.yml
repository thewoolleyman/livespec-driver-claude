# Per-target matrix CI for livespec-driver-claude.
#
# Family conventions scaled to this repo's content (thin SKILL.md
# bindings + plugin manifests + the e2e-cli harness consumer). Every
# step delegates to `just <target>` (direct tool invocations in
# `run:` lines are forbidden per livespec/SPECIFICATION/
# non-functional-requirements.md §"Toolchain pins").
#
# The check matrix + the two dedicated check jobs run in the SAME baked image
# the Fabro sandbox uses, on the local self-hosted runner — so "green in CI"
# and "green in sandbox" are the same environment (plan/fabro-ci-image-factoring).
# runs-on resolves from the repo variable CI_RUNNER_LABELS, defaulting to the
# self-hosted label; set it to '["ubuntu-latest"]' to reroute to GitHub-hosted
# when the local host is down (the merge-gate fallback). ci-green and
# export-telemetry stay ubuntu-latest so the gate is reportable host-down.

name: CI

# uv occasionally fails when the PyPI file CDN (files.pythonhosted.org)
# drops a wheel download mid-stream ("broken pipe"). UV_HTTP_RETRIES
# makes uv retry the fetch in-process instead of failing the job. On the
# self-hosted lane the `uv sync` steps hit the runner's ~/.cache/uv (NOT
# actions/cache, which was deleted in this cutover), so an unchanged lock
# installs from cache and never contacts PyPI at all.
env:
  UV_HTTP_RETRIES: "5"

on:
  pull_request:
  push:
    branches: [master]

jobs:
  check:
    name: ${{ matrix.target }}
    # Local self-hosted runner in the baked sandbox image (fallback: set the
    # CI_RUNNER_LABELS repo variable to '["ubuntu-latest"]'). The container is
    # the SAME tag the Fabro sandbox runs — that sameness collapses the
    # green-in-CI / red-in-sandbox drift this epic exists to remove.
    runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS || '["self-hosted","local-ci"]') }}
    container:
      image: ghcr.io/thewoolleyman/livespec-fabro-sandbox:python-v0.54.5
    env:
      # The image installs the pinned tools under /root (build-time HOME), but
      # container-hooks run steps with a DIFFERENT HOME — so mise's default data
      # dir ($HOME/.local/share/mise) is empty and `mise install` would RE-fetch
      # every tool. At matrix scale that means dozens of concurrent UNauthed
      # GitHub-API installs, which blow the anonymous rate limit and red the run
      # (proven live on livespec's cutover). Point mise at the baked data dir so
      # `mise install` is a true no-op — no downloads, no API calls.
      MISE_DATA_DIR: /root/.local/share/mise
      # A missing shim must fail fast, never busy-loop on auto-install.
      MISE_NOT_FOUND_AUTO_INSTALL: "0"
      # Defense-in-depth against GitHub's anonymous REST limit (60/hr PER IP):
      # the self-hosted matrix shares ONE host IP, so authenticate any residual
      # GitHub-API call with the per-run, auto-revoked, read-scoped Actions token
      # (github.token — NOT a Kind-2 secret) to stay under the ~1000/hr
      # authenticated cap. MISE_DATA_DIR already makes mise call nothing; this is
      # the belt-and-suspenders so the shared IP can never hit the anon wall.
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
    strategy:
      fail-fast: false
      matrix:
        target:
          # Canonical check set (livespec_dev_tooling.canonical_checks) minus
          # the two WORLD-GATE checks (check-master-ci-green,
          # check-branch-protection-alignment) which are excluded from the
          # CI-mirror requirement and enforce at pre-push under an admin token,
          # and minus check-red-green-replay (its own full-history job below).
          - check-agents-ai-references-resolve
          - check-aggregate-completeness
          - check-all-declared
          - check-assert-never-exhaustiveness
          - check-canonical-recipe-fidelity
          - check-check-coverage-incremental
          - check-check-mutation
          - check-check-tools
          - check-ci-matrix-completeness
          - check-claude-md-coverage
          - check-comment-line-anchors
          - check-commit-pairs-source-and-test
          - check-file-lloc
          - check-fleet-marketplace-relative-sources
          - check-global-writes
          - check-handoff-dispatch-routing
          - check-heading-coverage
          - check-keyword-only-args
          - check-local-memory-drift-audit
          - check-main-guard
          - check-match-keyword-only
          - check-newtype-domain-primitives
          - check-no-direct-destructive-cli
          - check-no-direct-tool-invocation
          - check-no-except-outside-io
          - check-no-fmt-directives
          - check-no-inheritance
          - check-no-lloc-soft-warnings
          - check-no-raise-outside-io
          - check-no-shadow-ledger-body-identical
          - check-no-shadow-ledger-body-typechecks
          - check-no-todo-registry
          - check-no-write-direct
          - check-partition-completeness
          - check-pbt-coverage-pure-modules
          - check-per-file-coverage
          - check-plan-thread-anchor-declared
          - check-plugin-resolution
          - check-primary-checkout-commit-refuse-hook-installed
          - check-private-calls
          - check-public-api-result-typed
          - check-rop-pipeline-shape
          - check-self-hosted-routing
          - check-skill-invocation-paths
          - check-source-trees-scoped-to-consumer
          - check-supervisor-discipline
          - check-tests-mirror-pairing
          - check-tests-no-subprocess-spawn
          - check-tool-backed-check-completeness
          - check-vendor-manifest
          - check-wrapper-shape
          # Repo-private extras (non-canonical). The four tool-backed gates
          # (lint/format/types/coverage) must be literal CI-matrix members per
          # check-tool-backed-check-completeness.
          - check-plugin-structure
          - check-lint
          - check-format
          - check-types
          - check-coverage
          - check-hooks
          - check-e2e-cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history: check-check-coverage-incremental diffs
          # origin/master...HEAD, and other metadata checks need the base ref
          # reachable. Cheap for this repo; harmless for the other legs.
          fetch-depth: 0

      # Hosted routing keeps the baked container image but checks out as the
      # runner uid while git runs as ROOT inside → "dubious ownership" (exit 128);
      # global-gitconfig safe.directory (HOME=/github/home) survives resolve_repo_root's
      # GIT_* scrub (config.py) so every git call reads it. No-op on the self-hosted lane.
      - name: Trust workspace for git (hosted container root-vs-checkout uid)
        run: git config --global --add safe.directory '*'

      # Tools are baked into the image; `mise install` is a near-no-op that just
      # confirms the pinned versions. A fresh container does not TRUST the repo
      # .mise.toml, so `mise trust` is required for the shims to resolve.
      # (Replaces the GitHub-hosted mise-action install + the actions/cache uv
      # restore — the local runner's persistent ~/.cache/uv is the cache now.)
      - name: mise trust + install (baked tools — install is a near-no-op)
        run: |
          mise trust
          mise install

      - name: Install Python dev deps via uv
        run: uv sync --all-groups

      # CI's actions/checkout does NOT install the git hooks, so
      # check-primary-checkout-commit-refuse-hook-installed would fail.
      # Install them here — AFTER uv sync, so the installer module is
      # importable — for the one matrix leg that exercises that check,
      # REUSING the same from-package installer bootstrap uses. The verifier
      # only READS the hook file; the hook never fires in this CI job.
      - name: Install commit-refuse hook (satisfy invariant)
        if: matrix.target == 'check-primary-checkout-commit-refuse-hook-installed'
        run: just install-commit-refuse-hooks

      - name: just ${{ matrix.target }}
        env:
          # Arm the CI-matrix drift guard: now that this repo's matrix +
          # ci-green are complete, flip check-ci-matrix-completeness from warn
          # (exit 0) to FAIL (exit 4) so any future canonical slug wired into
          # `just check` but dropped from CI reddens this leg. Harmless for the
          # other legs (they do not read this var).
          LIVESPEC_FAIL_IF_CI_MATRIX_GAPS_EXIST: "true"
        run: |
          # pyright (check-types) shells out to `npm`; under the container-hooks
          # HOME the mise npm shim busy-loops (no node registered for that HOME).
          # Put the image's real node/npm — derived from the shim's own location,
          # never a hardcoded image path — ahead of the shim on PATH. Harmless
          # for the non-npm targets.
          shims_dir="$(dirname "$(command -v npm)")"
          node_bin="$(cd "$shims_dir/../installs/node/latest/bin" 2>/dev/null && pwd || ls -d "$shims_dir/../installs/node"/*/bin 2>/dev/null | head -1)"
          [ -n "$node_bin" ] && export PATH="$node_bin:$PATH"
          just ${{ matrix.target }}

  # livespec core's doctor STATIC phase (reference-discipline + out-of-band
  # invariants), wired fleet-wide per livespec epic livespec-6jfq. core ships
  # the checker (doctor_static.py — self-contained, bare python3); this job
  # checks core out at the tag THIS repo pins (.livespec.jsonc compat.pinned)
  # and points the recipe at it via LIVESPEC_CORE_PLUGIN_ROOT. Its OWN job
  # (not the matrix) because it needs a second checkout — livespec core —
  # that no other target does. The core checkout is a fresh PUBLIC clone inside
  # the container (no host mount, containment preserved).
  check-doctor-static:
    name: check-doctor-static
    runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS || '["self-hosted","local-ci"]') }}
    container:
      image: ghcr.io/thewoolleyman/livespec-fabro-sandbox:python-v0.54.5
    env:
      MISE_DATA_DIR: /root/.local/share/mise
      MISE_NOT_FOUND_AUTO_INSTALL: "0"
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Hosted routing keeps the baked container image but checks out as the
      # runner uid while git runs as ROOT inside → "dubious ownership" (exit 128);
      # global-gitconfig safe.directory (HOME=/github/home) survives resolve_repo_root's
      # GIT_* scrub (config.py) so every git call reads it. No-op on the self-hosted lane.
      - name: Trust workspace for git (hosted container root-vs-checkout uid)
        run: git config --global --add safe.directory '*'

      - name: mise trust + install (baked tools — install is a near-no-op)
        run: |
          mise trust
          mise install

      - name: Resolve pinned livespec core ref (.livespec.jsonc compat.pinned)
        id: corepin
        run: |
          pinned="$(grep -oE '"pinned"[[:space:]]*:[[:space:]]*"[^"]*"' .livespec.jsonc | head -1 | sed -E 's/.*:[[:space:]]*"([^"]*)".*/\1/')"
          echo "ref=${pinned:-master}" >> "$GITHUB_OUTPUT"

      - name: Checkout livespec core at the pinned ref
        uses: actions/checkout@v4
        with:
          repository: thewoolleyman/livespec
          ref: ${{ steps.corepin.outputs.ref }}
          path: .livespec-core

      - name: just check-doctor-static
        run: |
          # In a container job, github.workspace (context) may be the HOST path;
          # $GITHUB_WORKSPACE (env) is the in-container mount, so derive the core
          # plugin root from it to stay container-correct.
          export LIVESPEC_CORE_PLUGIN_ROOT="${GITHUB_WORKSPACE}/.livespec-core/.claude-plugin"
          just check-doctor-static

  # check-red-green-replay runs in its OWN job (separate from the
  # `check` matrix above) because its no-arg commit-range mode validates
  # origin/master..HEAD and needs origin/master plus the merge base in
  # the clone — `fetch-depth: 0` (full history). The `check` matrix
  # deliberately keeps the default shallow checkout for its other
  # targets (deterministic functions of the working tree that do not
  # need history), so the range check gets its own full-history checkout
  # rather than forcing every matrix entry to fetch all history. Enforced
  # here per epic livespec-gcp2 (red-green-replay is enforced
  # fleet+adopter-wide). It runs UNCONDITIONALLY: on a zero-.py PR the
  # range carries no product .py and trivially passes; on a master push
  # the range is empty.
  check-red-green-replay:
    name: check-red-green-replay
    runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS || '["self-hosted","local-ci"]') }}
    container:
      image: ghcr.io/thewoolleyman/livespec-fabro-sandbox:python-v0.54.5
    env:
      MISE_DATA_DIR: /root/.local/share/mise
      MISE_NOT_FOUND_AUTO_INSTALL: "0"
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout (full history for commit-range validation)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Hosted routing keeps the baked container image but checks out as the
      # runner uid while git runs as ROOT inside → "dubious ownership" (exit 128);
      # global-gitconfig safe.directory (HOME=/github/home) survives resolve_repo_root's
      # GIT_* scrub (config.py) so every git call reads it. No-op on the self-hosted lane.
      - name: Trust workspace for git (hosted container root-vs-checkout uid)
        run: git config --global --add safe.directory '*'

      - name: mise trust + install (baked tools — install is a near-no-op)
        run: |
          mise trust
          mise install

      - name: Install Python dev deps via uv
        run: uv sync --all-groups

      - name: just check-red-green-replay
        run: just check-red-green-replay

  # Single all-green gate job (livespec epic livespec-cf4bcu,
  # fleet-ci-aggregate-coverage). This is the SOLE branch-protection
  # required context: it `needs:` every check-bearing job, so requiring
  # only `ci-green` blocks merges on the entire matrix + dedicated check
  # jobs via one stable context-name that never churns as checks are
  # added — replacing the brittle per-check required-context set. The
  # gate is a pure GitHub-expression check (no external action, no direct
  # tool invocation, so it satisfies NFR §"Toolchain pins"): `always()`
  # makes it run even when a dependency failed, and the step fails the
  # job iff any dependency failed or was cancelled. Stays ubuntu-latest so
  # the branch-protection context is reportable even when the host is down.
  ci-green:
    name: ci-green
    needs: [check, check-doctor-static, check-red-green-replay]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: All required checks passed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1

  export-telemetry:
    name: export-telemetry
    needs: [check, check-red-green-replay]
    if: ${{ !cancelled() && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Export CI run telemetry to Honeycomb (closed-loop verified)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          HONEYCOMB_GITHUB_CI_INGEST_KEY_LIVESPEC: ${{ secrets.HONEYCOMB_GITHUB_CI_INGEST_KEY_LIVESPEC }}
        run: bash .github/scripts/export-ci-telemetry.sh
